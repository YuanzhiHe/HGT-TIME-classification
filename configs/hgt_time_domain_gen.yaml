# Domain-generalized HGT-TIME configuration
# Wraps the canonical HGT-TIME with DANN + DICR for cross-platform/cross-section generalization.

experiment_id: EXP-DG01-DOMAIN-GEN
model_family: domain_generalized

input:
  graphs_dir: Experiment/core_code/outputs/hetero_graph/visium_breast_regions__hetero_v1/graphs

model:
  hidden_dim: 128
  num_layers: 3
  num_heads: 4
  dropout: 0.2
  num_classes: 3
  pheno_dim: 4
  use_pheno_head: true
  use_ranking_heads: true
  # Domain generalization-specific parameters
  domain_generalization:
    # Platform-level DANN (e.g., Visium vs Visium HD vs Xenium)
    use_platform_dann: true
    n_platforms: 3
    # Patient-level DANN (optional, for multi-patient cohorts)
    use_patient_dann: false
    n_patients: 10
    # Domain-Invariant Contrastive Regularization
    use_dicr: true
    dicr_temperature: 0.1
    # Multi-Domain Batch Normalization (optional)
    use_mdbn: false
    # DANN architecture
    dann_hidden_dim: 64
    dann_n_layers: 2
    dann_dropout: 0.1
    dann_alpha: 1.0
    # Loss weights for domain generalization terms
    lambda_platform: 0.1
    lambda_patient: 0.05
    lambda_dicr: 0.1

loss:
  classification_weight: 1.0
  phenotype_weight: 0.3
  ranking_weight: 0.1
  label_smoothing: 0.05

runtime:
  epochs: 100
  learning_rate: 1.0e-3
  weight_decay: 1.0e-5
  batch_size: 4
  patience: 15
  scheduler: cosine
  scheduler_kwargs:
    T_max: 100

split:
  n_folds: 5
  unit: graph_id
