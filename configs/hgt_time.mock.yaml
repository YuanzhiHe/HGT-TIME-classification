input:
  graphs_dir: outputs/hetero_graph/visium_mock__hetero_v1/graphs

runtime:
  batch_size: 2
  epochs: 20
  learning_rate: 1e-3
  weight_decay: 1e-5
  shuffle: false
  seed: 42
  topk: 3
  inject_mock_targets: true

model:
  hidden_dim: 64
  num_layers: 2
  num_heads: 4
  dropout: 0.1
  num_classes: 3
  pheno_dim: 4
  use_pheno_head: true
  use_cell_state_head: false
  cell_state_dim: 4
  use_ranking_heads: true

loss:
  classification_weight: 1.0
  phenotype_weight: 0.3
  region_weight: 0.0
  ranking_weight: 0.2
  label_smoothing: 0.0
  huber_delta: 1.0
  max_ranking_pairs_per_graph: 64
  class_weights: null

targets:
  gene_positive_ids:
    - IFNG
    - CXCL10
    - CD3D
    - COL1A1
    - TAGLN
  pathway_positive_ids:
    - path:hsa04660
    - path:hsa04510

split:
  unit: "patient_id"
  n_folds: 5
  inner_folds: 3

model_family: "hgt_time"
