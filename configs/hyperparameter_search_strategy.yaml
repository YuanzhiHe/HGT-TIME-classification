# 超参数搜索空间与调参策略 (2026-04-07)
# 推荐使用 Optuna 或 Ray Tune 解析此配置

search_strategy:
  method: "bayesian"  # TPE (Tree-structured Parzen Estimator) in Optuna
  metric: "macro_auroc"
  mode: "maximize"
  n_trials: 30
  pruner: "median"  # Median stopping rule
  cv_folds: 3  # Inner 3-fold cross validation for evaluation

spaces:
  common_runtime:
    learning_rate:
      type: "loguniform"
      low: 1e-5
      high: 1e-2
      default: 1e-3
    weight_decay:
      type: "loguniform"
      low: 1e-6
      high: 1e-3
      default: 1e-5
    batch_size:
      type: "categorical"
      choices: [2, 4, 8]
      default: 4

  hgt_time:
    hidden_dim:
      type: "categorical"
      choices: [32, 64, 128]
      default: 64
    num_layers:
      type: "int"
      low: 1
      high: 4
      default: 2
    num_heads:
      type: "categorical"
      choices: [2, 4, 8]
      default: 4
    dropout:
      type: "uniform"
      low: 0.0
      high: 0.5
      default: 0.1
    loss_weights:
      phenotype_weight:
        type: "uniform"
        low: 0.0
        high: 1.0
        default: 0.3
      ranking_weight:
        type: "uniform"
        low: 0.0
        high: 1.0
        default: 0.2

  homogeneous_graph:
    hidden_dim:
      type: "categorical"
      choices: [32, 64, 128]
      default: 64
    num_layers:
      type: "int"
      low: 1
      high: 4
      default: 2
    conv_type:
      type: "categorical"
      choices: ["gcn", "gat"]
      default: "gcn"
    dropout:
      type: "uniform"
      low: 0.0
      high: 0.5
      default: 0.1

  non_graph:
    hidden_dim:
      type: "categorical"
      choices: [64, 128, 256]
      default: 128
    num_layers:
      type: "int"
      low: 2
      high: 5
      default: 3
    dropout:
      type: "uniform"
      low: 0.0
      high: 0.5
      default: 0.1

resources_per_trial:
  cpu: 4
  gpu: 0.5  # Allows running 2 trials per GPU concurrently if VRAM permits
