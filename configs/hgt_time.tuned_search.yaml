experiment_id: "EXP-M02-HGT-TUNED"
model_family: hgt_time

input:
  graphs_dir: outputs/hetero_graph/visium_breast_regions__hetero_v1/graphs

runtime:
  batch_size: 8
  shuffle: true
  topk: 10
  inject_mock_targets: false
  epochs: 100
  learning_rate: 0.00979539727691856
  weight_decay: 1.2564148616609052e-05
  seed: 42
  num_workers: 4
  eval_every: 1
  patience: 15
  scheduler: "cosine"
  scheduler_kwargs:
    T_max: 100

model:
  hidden_dim: 64
  num_layers: 1
  num_heads: 8
  dropout: 0.12996039717184932
  num_classes: 3
  pheno_dim: 4
  use_pheno_head: true
  use_cell_state_head: false
  cell_state_dim: 4
  use_ranking_heads: true

loss:
  classification_weight: 1.0
  phenotype_weight: 0.5022397940263714
  region_weight: 0.0
  ranking_weight: 0.8883013101466182
  label_smoothing: 0.05
  huber_delta: 1.0
  max_ranking_pairs_per_graph: 256
  class_weights: null

split:
  unit: "graph_id"
  n_folds: 5
  inner_folds: 3
