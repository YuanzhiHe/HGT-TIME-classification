# Foundation Model MLP on HEST-1k Visium (LOPO)
# Tests whether pretrained features + MLP generalizes across patients

experiment_id: "EXP-LOPO-FM"

input:
  graphs_dir: "outputs/hetero_graph/hest1k_visium__hetero_v1/graphs"

runtime:
  batch_size: 4
  epochs: 100
  learning_rate: 1e-3
  weight_decay: 1e-5
  seed: 42
  num_workers: 4
  eval_every: 1
  patience: 15
  scheduler: "cosine"
  scheduler_kwargs:
    T_max: 100

model_family: "foundation_model"

model:
  hidden_dim: 128
  num_classes: 2
  dropout: 0.1

loss:
  label_smoothing: 0.1
  class_weights: [1.0, 1.0]

split:
  unit: "patient_id"
  n_folds: 5
  inner_folds: 3
  keep_classes: [0, 2]
