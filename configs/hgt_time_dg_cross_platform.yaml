# Cross-platform transfer: Domain-generalized HGT-TIME with patient-level DANN + DICR
# Trained on HEST-1k Visium, evaluated on HEST-1k Xenium.
# Uses patient-level DANN (5 patients as domains) to learn patient-invariant
# graph representations. Platform-level DANN is disabled because training data
# contains only Visium (single platform).

experiment_id: "EXP-CROSS-PLATFORM-HGT-DG"
model_family: domain_generalized

input:
  graphs_dir: outputs/hetero_graph/hest1k_visium__hetero_v1/graphs

runtime:
  batch_size: 4
  shuffle: true
  topk: 10
  inject_mock_targets: false
  epochs: 100
  learning_rate: 1e-3
  weight_decay: 1e-5
  seed: 42
  num_workers: 4
  eval_every: 1
  patience: 15
  scheduler: "cosine"
  scheduler_kwargs:
    T_max: 100

model:
  hidden_dim: 128
  num_layers: 3
  num_heads: 4
  dropout: 0.2
  num_classes: 2          # Binary: Hot vs Cold
  pheno_dim: 4
  use_pheno_head: true
  use_cell_state_head: false
  cell_state_dim: 4
  use_ranking_heads: true
  # Domain generalization: patient-level DANN + DICR
  domain_generalization:
    use_platform_dann: false       # single-platform training, no platform DANN
    n_platforms: 1
    use_patient_dann: true         # 5 patients as domains
    n_patients: 5
    use_dicr: true
    dicr_temperature: 0.1
    use_mdbn: false
    dann_hidden_dim: 64
    dann_n_layers: 2
    dann_dropout: 0.1
    dann_alpha: 1.0
    lambda_platform: 0.0
    lambda_patient: 0.1
    lambda_dicr: 0.1

loss:
  classification_weight: 1.0
  phenotype_weight: 0.3
  region_weight: 0.0
  ranking_weight: 0.1
  label_smoothing: 0.05
  huber_delta: 1.0
  max_ranking_pairs_per_graph: 256
  class_weights: null

split:
  unit: "patient_id"      # Leave-one-patient-out
  n_folds: 5              # 5 patients = 5 folds = true LOPO
  inner_folds: 3
  keep_classes: [0, 2]    # Keep Hot (0) and Cold (2), drop Excluded (1)

targets:
  gene_positive_ids: []
  pathway_positive_ids: []
