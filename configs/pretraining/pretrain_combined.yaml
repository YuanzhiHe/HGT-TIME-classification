# Combined pretraining: ST-bank (~2.18M pairs) + HEST-1k breast (140 samples, ~235K pairs)
# Total: ~2.42M image-expression pairs

data:
  stbank_dir: "data/stbank"
  hest1k_dir: "data/hest1k_breast"
  n_genes: 2000

model:
  image_backbone: "vit_small_patch16_224"
  embed_dim: 256
  expr_hidden_dim: 256
  expr_n_layers: 3
  expr_dropout: 0.1
  init_temp: 0.07
  freeze_image_backbone: false

batch_size: 32
epochs: 3
learning_rate: 3.0e-4
weight_decay: 1.0e-4
min_lr: 1.0e-6
num_workers: 4
img_size: 224

max_steps: 8000
save_every_steps: 2000
save_every: 1

output_dir: "outputs/pretrain/combined"
