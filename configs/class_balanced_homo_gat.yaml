# ============================================================
# EXP-B08-GAT-CB — Homogeneous GAT Baseline
# ============================================================
# Graph Attention Network on cell-cell spatial adjacency graph.
# Cell nodes only; no gene/pathway nodes; no PPI/KEGG edges.
# ============================================================

experiment_id: "EXP-B08-GAT-CB"

input:
  graphs_dir: "Experiment/core_code/outputs/hetero_graph/visium_breast_regions__hetero_v1/graphs"

runtime:
  batch_size: 4
  epochs: 100
  learning_rate: 1e-3
  weight_decay: 1e-5
  seed: 42
  num_workers: 4
  eval_every: 5
  patience: 15
  scheduler: "cosine"
  scheduler_kwargs:
    T_max: 100

model_family: "homogeneous_graph"

model:
  input_dim: 50
  hidden_dim: 64
  num_classes: 3
  num_layers: 2
  dropout: 0.1
  conv_type: "gat"
  heads: 2

loss:
  label_smoothing: 0.1
  class_weights: [1.2, 1.2, 0.75]   # inverse-frequency (10 Hot,10 Excluded,16 Cold)

split:
  unit: "graph_id"
  n_folds: 5
  inner_folds: 3
